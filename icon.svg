  <rect x="260" y="173" width="76" height="62" rx="8" fill="#0d0d12"/>
  <!-- Wheel left -->
  <circle cx="166" cy="330" r="36" fill="#0d0d12" stroke="#e8ff47" stroke-width="7"/>
  <circle cx="166" cy="330" r="13" fill="#e8ff47"/>
  <!-- Wheel right -->
  <circle cx="346" cy="330" r="36" fill="#0d0d12" stroke="#e8ff47" stroke-width="7"/>
  <circle cx="346" cy="330" r="13" fill="#e8ff47"/>
  <!-- FLEET label -->
  <text x="256" y="430" font-family="Arial Black,Arial,sans-serif" font-size="64" font-weight="900" fill="#e8ff47" text-anchor="middle" letter-spacing="6">FLEET</text>
