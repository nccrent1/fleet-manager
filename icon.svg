<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#050508"/>
  <!-- Car body -->
  <rect x="106" y="240" width="300" height="85" rx="18" fill="#e8ff47"/>
  <!-- Car roof -->
  <rect x="166" y="165" width="180" height="85" rx="14" fill="#e8ff47"/>
  <!-- Window left -->
  <rect x="176" y="173" width="76" height="62" rx="8" fill="#0d0d12"/>
